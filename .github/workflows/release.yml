name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Prefetch deb assets (sing-box core + geo rule-set seeds)
        run: ./scripts/fetch-deb-deps.sh
      - name: Use annotated tag message as release notes
        run: git tag -l --format='%(contents)' "$GITHUB_REF_NAME" > /tmp/release-notes.md
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean --release-notes=/tmp/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
