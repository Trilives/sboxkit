<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>sboxkit console</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <div class="topbar">
        <div class="brand">
          <div class="brand-mark">SB</div>
          <div>
            <h1>sboxkit console</h1>
            <div class="subtitle" id="apiLine">Connecting to Clash API</div>
          </div>
        </div>
        <div class="commands">
          <button id="reloadBtn" class="primary" type="button">Refresh</button>
          <button id="testAllBtn" type="button">Test Visible</button>
          <button id="themeBtn" type="button">Dark</button>
        </div>
      </div>

      <form class="auth" id="authBox">
        <input id="tokenInput" type="password" autocomplete="off" placeholder="API token">
        <button type="submit">Apply</button>
        <button id="clearTokenBtn" type="button">Clear</button>
      </form>

      <section class="status-grid" aria-label="Status">
        <div class="metric"><div class="metric-label">Version</div><div class="metric-value" id="versionValue">-</div></div>
        <div class="metric"><div class="metric-label">Mode</div><div class="metric-value" id="modeValue">-</div></div>
        <div class="metric"><div class="metric-label">Groups</div><div class="metric-value" id="groupValue">-</div></div>
        <div class="metric"><div class="metric-label">Nodes</div><div class="metric-value" id="nodeValue">-</div></div>
      </section>

      <section class="controls panel">
        <div class="panel-title"><strong>Proxy Groups</strong><span class="fine" id="updatedAt">Never updated</span></div>
        <input class="search" id="searchInput" type="search" placeholder="Filter groups or nodes">
        <div class="tabs" role="tablist" aria-label="Group filter">
          <button class="active" type="button" data-filter="all">All</button>
          <button type="button" data-filter="selector">Selector</button>
          <button type="button" data-filter="urltest">URL Test</button>
        </div>
      </section>

      <section class="group-board" id="groupBoard">
        <div class="notice">Loading</div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
